# Cluster configuration
# Edit this file to match your cluster environment.
# No Python code should reference hardcoded paths — all cluster-specific
# values must come from here.

# Conda environments
envs:
  # Primary env: vLLM + math_verify — math and knowledge benchmarks
  primary: /mnt/weka/home/haolong.jia/miniconda3/envs/qwen-eval
  # Code env: vLLM + evalplus — HumanEval and MBPP benchmarks
  code: /mnt/weka/home/haolong.jia/miniconda3/envs/evalplus-eval
  # Harness env: lm-evaluation-harness — IFEval, ARC, HellaSwag, etc.
  harness: /mnt/weka/home/haolong.jia/miniconda3/envs/harness-eval

# SLURM defaults — individual tasks can override these in config/tasks.yaml
slurm:
  partition: lowprio
  qos: lowprio
  ntasks: 1
  cpus_per_task: 96
  mem: "800G"
  default_time: "12:00:00"

# Output root — all evaluation results are written here, never inside the repo
# NOTE: set to local out/ for testing; restore to production path before real runs
output_root: /mnt/weka/home/haolong.jia/eval/llm-eval/out
# Note: repo_root is derived from __file__ in ConfigLoader — not stored here.