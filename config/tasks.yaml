# Task configuration
# Each task defines sampling parameters, SLURM resource overrides, and dataset info.
# SLURM fields not listed here fall back to cluster.yaml defaults.
#
# Fields:
#   sampling:
#     temperature    — generation temperature
#     top_p          — nucleus sampling threshold
#     n_sampling     — number of samples per problem
#     max_tokens     — max new tokens per generation
#   k_list           — values of k for pass@k reporting (multi-sample tasks only)
#   num_shots        — number of few-shot examples in prompt
#   prompt_type      — prompt format identifier (cot, flan_cot, default, ...)
#   slurm:           — per-task overrides for cluster.yaml slurm defaults
#     gpus, mem, time, cpus_per_task
#   dataset:
#     source         — "hf" (HuggingFace datasets) or "lm_harness" (lm-evaluation-harness)
#     name           — HuggingFace dataset id
#     subset         — HuggingFace dataset subset/config name (if applicable)
#     split          — dataset split to use
#     task_name      — lm_eval task name (for lm_harness source only)

# ---------------------------------------------------------------------------
# Math benchmarks
# ---------------------------------------------------------------------------

gsm8k:
  sampling:
    temperature: 0.6
    top_p: 0.95
    n_sampling: 16
    max_tokens: 4096
    max_model_len: 8192
    stop: ["</s>", "<|im_end|>", "\n\nQ:"]
  k_list: [1, 2, 4, 8, 16]
  num_shots: 8
  prompt_type: cot
  slurm:
    gpus: 1
    mem: "800G"
    time: "12:00:00"
    cpus_per_task: 96
  dataset:
    source: local
    path: data/math/gsm8k_test.jsonl

math500:
  sampling:
    temperature: 0.6
    top_p: 0.95
    n_sampling: 64
    max_tokens: 4096
  k_list: [1, 2, 4, 8, 16, 32, 64]
  num_shots: 4
  prompt_type: cot
  slurm:
    gpus: 1
    mem: "800G"
    time: "12:00:00"
    cpus_per_task: 96
  dataset:
    source: local
    path: data/math/math500_test.jsonl

