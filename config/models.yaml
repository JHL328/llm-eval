# Model registry
# Each entry defines one model to evaluate.
# Fields:
#   name  — human-readable identifier, used as output directory name
#   path  — absolute path to the model checkpoint on the cluster
#   type  — "sft" (instruction-tuned, apply chat template) or "base" (raw)
#   gpus  — number of GPUs for tensor parallelism (vLLM tensor_parallel_size)
#
# To add a new model: append an entry below — no Python changes needed.
# To skip a model:    comment out its entry with #

# ---------------------------------------------------------------------------
# SFT / Instruction-tuned models
# ---------------------------------------------------------------------------
sft:
  - name: Qwen3-1.7B-Instruct
    path: /mnt/weka/shrd/k2m/haolong.jia/checkpoint/Qwen3-1.7B
    gpus: 1

